<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSocial: Secondary School Choices</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --feedback-bg: #334155;
            --disabled-bg: #1e293b;
            --disabled-text: #475569;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        #game-container {
            background-color: var(--container-bg);
            max-width: 650px;
            width: 100%;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            border-bottom: 2px solid var(--feedback-bg);
            padding-bottom: 15px;
            text-align: center;
        }

        .meter-container {
            margin-bottom: 25px;
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .meter-bar {
            width: 100%;
            height: 14px;
            background-color: var(--feedback-bg);
            border-radius: 7px;
            overflow: hidden;
        }

        #empathy-fill {
            height: 100%;
            background-color: var(--accent);
            width: 50%;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        #story-text {
            font-size: 1.15rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background-color: var(--feedback-bg);
            color: var(--text-primary);
            border: 2px solid transparent;
            padding: 16px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        button:hover:not(:disabled) {
            border-color: var(--accent);
            background-color: #475569;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--disabled-bg);
            color: var(--disabled-text);
            border: 2px solid var(--feedback-bg);
            cursor: not-allowed;
            transform: none;
        }

        #feedback-panel {
            display: none;
            background-color: var(--feedback-bg);
            border-left: 4px solid var(--accent);
            padding: 16px;
            margin-bottom: 25px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .casel-tag {
            font-weight: bold;
            color: var(--accent);
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .menu-btn {
            background-color: var(--accent);
            border-color: var(--accent);
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

        .menu-btn:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="scenario-title">ProSocial Choices</h1>
        
        <div class="meter-container" id="meter-ui">
            <div class="meter-label">
                <span>Overall Empathy & Social Score</span>
                <span id="score-display">50%</span>
            </div>
            <div class="meter-bar">
                <div id="empathy-fill"></div>
            </div>
        </div>

        <div id="feedback-panel"></div>
        <div id="story-text"></div>
        <div class="choices" id="choices-container"></div>
    </div>

    <script>
        // Game State
        let currentScore = 50;
        let passedScenarios = new Set(); // Tracks successfully completed scenarios

        // UI Elements
        const storyTextEl = document.getElementById('story-text');
        const choicesContainerEl = document.getElementById('choices-container');
        const feedbackPanelEl = document.getElementById('feedback-panel');
        const scoreDisplayEl = document.getElementById('score-display');
        const empathyFillEl = document.getElementById('empathy-fill');
        const titleEl = document.getElementById('scenario-title');

        function updateScore(change) {
            currentScore += change;
            if (currentScore > 100) currentScore = 100;
            if (currentScore < 0) currentScore = 0;
            
            scoreDisplayEl.textContent = currentScore + '%';
            empathyFillEl.style.width = currentScore + '%';

            if (currentScore >= 70) empathyFillEl.style.backgroundColor = 'var(--success)';
            else if (currentScore <= 30) empathyFillEl.style.backgroundColor = 'var(--danger)';
            else empathyFillEl.style.backgroundColor = 'var(--accent)';
        }

        // Scene Database
        const scenes = {
            // MAIN MENU
            hub: {
                title: "Select a Scenario",
                text: "Welcome. Choose a situation below to test your social and emotional decision-making skills. Your choices will impact your overall score.",
                getChoices: () => [
                    { text: passedScenarios.has('s1') ? "Scenario 1: LLP Project ✅" : "Scenario 1: The LLP Project Meltdown", next: "s1_start", key: 's1' },
                    { text: passedScenarios.has('s2') ? "Scenario 2: Cafeteria ✅" : "Scenario 2: The Cafeteria Exclusion", next: "s2_start", key: 's2' },
                    { text: passedScenarios.has('s3') ? "Scenario 3: Group Chat ✅" : "Scenario 3: The Group Chat Gossip", next: "s3_start", key: 's3' },
                    { text: passedScenarios.has('s4') ? "Scenario 4: CCA Tryouts ✅" : "Scenario 4: The CCA Tryout Frustration", next: "s4_start", key: 's4' },
                    { text: passedScenarios.has('s5') ? "Scenario 5: Stolen Credit ✅" : "Scenario 5: The Stolen Credit", next: "s5_start", key: 's5' }
                ]
            },

            // SCENARIO 1: LLP PROJECT
            s1_start: {
                title: "Scenario 1: The LLP Project",
                text: "Your group is planning a school-wide upcycling pitch. Jordan rolls his eyes and says to Taylor: 'Your upcycling idea is trash. This is stupid.' Taylor looks down and stops typing. What do you do?",
                choices: [
                    { text: "Yell: 'Don't be a jerk, you haven't done anything!'", next: "s1_bad", score: -10, tag: "CASEL: Self-Management", feedback: "Reacting with anger escalated the conflict." },
                    { text: "Ignore it to avoid drama.", next: "s1_bad", score: -10, tag: "CASEL: Social Awareness", feedback: "Ignoring the bullying validated Jordan's toxic behavior." },
                    { text: "Calmly say: 'Let's keep it respectful. Taylor, what was your idea?'", next: "s1_step2", score: 10, tag: "CASEL: Relationship Skills", feedback: "Good start. You set boundaries against bullying and used active listening." }
                ]
            },
            s1_step2: {
                text: "Jordan backs down, but Taylor is still staring at their desk, looking too anxious to share their idea. How do you encourage them?",
                choices: [
                    { text: "Push them: 'Come on Taylor, just tell us so we can finish.'", next: "s1_mixed", score: -5, tag: "CASEL: Social Awareness", feedback: "Being pushy adds pressure and ignores Taylor's emotional state." },
                    { text: "Support them: 'Take your time, Taylor. I thought your idea about the tote bags was really cool.'", next: "s1_good", score: 15, tag: "CASEL: Relationship Skills", feedback: "Excellent. You provided a safe, supportive space for a quiet teammate to contribute." }
                ]
            },
            s1_bad: { text: "The group falls apart. The project is ruined.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s1_mixed: { text: "The pitch gets done, but Taylor never speaks again. The group dynamic remains tense.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s1_good: { text: "Taylor smiles and shares a great idea about upcycling uniforms. The group succeeds together.", markPassed: 's1', choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },

            // SCENARIO 2: CAFETERIA
            s2_start: {
                title: "Scenario 2: The Cafeteria",
                text: "During recess, you notice a new transfer student sitting alone. Two of your friends start whispering and laughing at the new student's lunch. What do you do?",
                choices: [
                    { text: "Laugh along with your friends to fit in.", next: "s2_bad", score: -10, tag: "CASEL: Responsible Decision-Making", feedback: "You chose peer approval over ethics, engaging in indirect bullying." },
                    { text: "Tell your friends: 'Not cool guys.'", next: "s2_step2", score: 10, tag: "CASEL: Social Awareness", feedback: "Good. You stood up to peer pressure." }
                ]
            },
            s2_step2: {
                text: "One of your friends rolls their eyes and says, 'Chill out, it's just a joke.' They look at you, waiting for you to back down.",
                choices: [
                    { text: "'Whatever, I'm just gonna go sit somewhere else.'", next: "s2_mixed", score: 5, tag: "CASEL: Self-Awareness", feedback: "You removed yourself from a toxic situation, but didn't fully support the victim." },
                    { text: "'Jokes are supposed to be funny, not mean. I'm going to ask if they want to sit with us.'", next: "s2_good", score: 15, tag: "CASEL: Responsible Decision-Making", feedback: "Perfect. You firmly defended your values and actively included the new student." }
                ]
            },
            s2_bad: { text: "The new student notices the laughing and leaves the cafeteria looking crushed.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s2_mixed: { text: "The new student eats alone. Your friends continue their toxic behavior uncorrected.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s2_good: { text: "The new kid is relieved and turns out to be really funny. Your friends realize they were being jerks.", markPassed: 's2', choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },

            // SCENARIO 3: GROUP CHAT
            s3_start: {
                title: "Scenario 3: The Group Chat",
                text: "A classmate sends a humiliating photo of another student in your class WhatsApp group, adding a mean caption. People are replying with laughing emojis.",
                choices: [
                    { text: "Reply with a laughing emoji. It's just a joke.", next: "s3_bad", score: -10, tag: "CASEL: Social Awareness", feedback: "You actively participated in cyberbullying." },
                    { text: "Reply to the group: 'This is cyberbullying. Delete it.'", next: "s3_step2", score: 10, tag: "CASEL: Responsible Decision-Making", feedback: "You showed strong ethical leadership by calling out digital harassment." }
                ]
            },
            s3_step2: {
                text: "The sender replies in the group: 'Wow, somebody can't take a joke.' A few other classmates go quiet, waiting to see what happens next.",
                choices: [
                    { text: "Type back: 'You're an idiot.'", next: "s3_mixed", score: -5, tag: "CASEL: Self-Management", feedback: "You started a flame war, which escalates the drama rather than helping the victim." },
                    { text: "Screenshot the chat as evidence, put your phone away, and check on the victim in person the next day.", next: "s3_good", score: 15, tag: "CASEL: Relationship Skills", feedback: "Excellent. You didn't feed the troll, gathered evidence, and supported the victim directly." }
                ]
            },
            s3_bad: { text: "The photo spreads, causing severe emotional distress to the student.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s3_mixed: { text: "The group chat turns into a massive argument, and the original issue gets lost in the fighting.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s3_good: { text: "Without an audience, the sender gets embarrassed and deletes the photo. The victim feels safe knowing you have their back.", markPassed: 's3', choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },

            // SCENARIO 4: CCA TRYOUTS
            s4_start: {
                title: "Scenario 4: CCA Tryouts",
                text: "During a tense sports CCA tryout, your teammate drops the ball, costing your team a point. Another player immediately shouts a severe vulgarity at them.",
                choices: [
                    { text: "Shout back at the toxic player: 'Shut your mouth!'", next: "s4_bad", score: -10, tag: "CASEL: Self-Management", feedback: "Fighting fire with fire destroys team morale and shows poor emotional regulation." },
                    { text: "Say loudly: 'Hey, watch the language! Let's get the next point.'", next: "s4_step2", score: 10, tag: "CASEL: Self-Management", feedback: "Good job de-escalating the tension and refocusing the team." }
                ]
            },
            s4_step2: {
                text: "The toxic player stops shouting, but your teammate who made the mistake is visibly shaking and looks ready to give up.",
                choices: [
                    { text: "Ignore it and just serve the ball to keep the game moving.", next: "s4_mixed", score: 0, tag: "CASEL: Social Awareness", feedback: "You missed a crucial opportunity to rebuild your teammate's confidence." },
                    { text: "Walk over, give them a high-five, and say, 'Don't sweat it, you've got this.'", next: "s4_good", score: 15, tag: "CASEL: Relationship Skills", feedback: "Brilliant. You demonstrated true leadership and empathy, turning a bad moment into a supportive one." }
                ]
            },
            s4_bad: { text: "The game turns into a shouting match. The coach benches both of you.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s4_mixed: { text: "Your team finishes the game, but your teammate plays terribly because they lost all confidence.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s4_good: { text: "Your teammate nods, takes a deep breath, and scores the winning point on the next play.", markPassed: 's4', choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },

            // SCENARIO 5: STOLEN CREDIT
            s5_start: {
                title: "Scenario 5: Stolen Credit",
                text: "You are doing a joint presentation. You did all the research for slides 3 and 4. During the presentation, your partner suddenly presents those slides as if they did all the work themselves.",
                choices: [
                    { text: "Interrupt them immediately: 'Liar! I did that!'", next: "s5_bad", score: -10, tag: "CASEL: Self-Management", feedback: "An outburst during a presentation shows poor emotional regulation." },
                    { text: "Wait until their part finishes, then seamlessly add: 'To expand on the research I conducted for these slides...'", next: "s5_step2", score: 10, tag: "CASEL: Responsible Decision-Making", feedback: "You maintained professionalism while firmly claiming credit for your hard work." }
                ]
            },
            s5_step2: {
                text: "The presentation finishes. As you walk back to your desks, your partner whispers angrily: 'Why did you try to make me look bad in front of the teacher?'",
                choices: [
                    { text: "'Because you stole my work, you snake!'", next: "s5_mixed", score: -5, tag: "CASEL: Relationship Skills", feedback: "You let anger take over, turning a professional boundary into a personal attack." },
                    { text: "'I just made sure my contributions were acknowledged. Next time, let's clearly divide who presents what.'", next: "s5_good", score: 15, tag: "CASEL: Self-Awareness", feedback: "Perfect. You stood your ground, communicated clearly, and offered a constructive solution for the future." }
                ]
            },
            s5_bad: { text: "The teacher docks points from both of you for lack of professionalism and teamwork.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s5_mixed: { text: "You get the credit you deserve, but your partner refuses to ever work with you again, creating lasting tension.", choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] },
            s5_good: { text: "Your partner realizes they were in the wrong and apologizes. The teacher praises your thorough research.", markPassed: 's5', choices: [{ text: "Return to Menu", next: "hub", isMenu: true }] }
        };

        function renderScene(sceneId, previousFeedbackTag = null, previousFeedback = null) {
            const scene = scenes[sceneId];
            
            // Mark scenario as passed if applicable
            if (scene.markPassed) {
                passedScenarios.add(scene.markPassed);
            }

            // Handle Hub/Menu Reset
            if (sceneId === 'hub') {
                feedbackPanelEl.style.display = 'none';
                titleEl.textContent = scene.title;
            } else {
                titleEl.textContent = scene.title || "ProSocial Choices";
                if (previousFeedback) {
                    feedbackPanelEl.innerHTML = `<span class="casel-tag">${previousFeedbackTag}</span>${previousFeedback}`;
                    feedbackPanelEl.style.display = 'block';
                } else {
                    feedbackPanelEl.style.display = 'none';
                }
            }

            storyTextEl.textContent = scene.text;
            choicesContainerEl.innerHTML = '';

            const choices = typeof scene.getChoices === 'function' ? scene.getChoices() : scene.choices;

            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.textContent = choice.text;
                
                if (choice.isMenu) {
                    btn.classList.add('menu-btn');
                }

                // Disable if the scenario is already passed
                if (sceneId === 'hub' && passedScenarios.has(choice.key)) {
                    btn.disabled = true;
                }

                btn.onclick = () => {
                    if (choice.score) {
                        updateScore(choice.score);
                    }
                    renderScene(choice.next, choice.tag, choice.feedback);
                };
                choicesContainerEl.appendChild(btn);
            });
        }

        // Initialize Game at the Hub
        renderScene('hub');
    </script>
</body>
</html>
